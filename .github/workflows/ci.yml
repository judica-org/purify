name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Initialize required submodules
        run: git submodule update --init --depth 1 third_party/secp256k1-zkp third_party/nanobench reference/purify

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DPURIFY_BUILD_BENCH=ON
          -DPURIFY_BUILD_DOCS=OFF
          -DPURIFY_BUILD_FUZZ=ON
          -DPURIFY_BUILD_TESTS=ON
          -DPURIFY_BUILD_REFERENCE_TESTS=ON

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure
