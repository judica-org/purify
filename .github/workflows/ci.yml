name: ci

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        mode:
          - tagged
          - legacy

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }} / ${{ matrix.mode }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Initialize required submodules
        run: git submodule update --init --depth 1 third_party/secp256k1-zkp third_party/nanobench reference/purify

      - name: Configure
        run: cmake --preset ${{ matrix.mode }}

      - name: Build
        run: cmake --build --preset ${{ matrix.mode }} --parallel

      - name: Test
        run: ctest --preset ${{ matrix.mode }}

  build-paper:
    runs-on: ubuntu-latest
    name: ubuntu-latest / paper

    steps:
      - uses: actions/checkout@v4

      - name: Install LaTeX toolchain
        run: sudo apt-get update && sudo apt-get install -y latexmk texlive-latex-extra texlive-fonts-recommended texlive-latex-recommended

      - name: Build paper
        run: ./docs/paper/build.sh

      - name: Upload paper artifact
        uses: actions/upload-artifact@v4
        with:
          name: purify-paper-pdf
          path: docs/paper/purify-paper.pdf
