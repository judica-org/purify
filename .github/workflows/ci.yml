name: ci

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  cxx-standards:
    strategy:
      fail-fast: false
      matrix:
        cxx_standard:
          - 20
          - 23

    runs-on: ubuntu-latest
    name: ubuntu-latest / tagged / c++${{ matrix.cxx_standard }}
    env:
      SCCACHE_GHA_ENABLED: "true"
      SCCACHE_IGNORE_SERVER_IO_ERROR: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Enable sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Initialize required submodules
        run: git submodule update --init --depth 1 third_party/secp256k1-zkp

      - name: Configure
        run: >
          cmake --preset tagged
          -DPURIFY_CXX_STANDARD=${{ matrix.cxx_standard }}
          -DPURIFY_BUILD_CLI=OFF
          -DPURIFY_BUILD_REFERENCE_TESTS=OFF
          -DCMAKE_C_COMPILER_LAUNCHER=sccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Build
        run: cmake --build --preset tagged --parallel --target purify_tests purify_c_tests

      - name: Show sccache stats
        run: sccache --show-stats

      - name: Test
        run: >
          ctest --test-dir build-tagged --output-on-failure
          -R 'purify\.tests\..*|purify\.c_api'

  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        mode:
          - tagged
          - legacy

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }} / ${{ matrix.mode }}
    env:
      SCCACHE_GHA_ENABLED: "true"
      SCCACHE_IGNORE_SERVER_IO_ERROR: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Enable sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Initialize required submodules
        run: git submodule update --init --depth 1 third_party/secp256k1-zkp third_party/nanobench reference/purify

      - name: Configure
        run: >
          cmake --preset ${{ matrix.mode }}
          -DCMAKE_C_COMPILER_LAUNCHER=sccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Build
        run: cmake --build --preset ${{ matrix.mode }} --parallel

      - name: Show sccache stats
        run: sccache --show-stats

      - name: Test
        run: ctest --preset ${{ matrix.mode }}

  sanitizers-int:
    runs-on: ubuntu-latest
    name: ubuntu-latest / asan-ubsan-int
    env:
      SCCACHE_GHA_ENABLED: "true"
      SCCACHE_IGNORE_SERVER_IO_ERROR: "1"
      ASAN_OPTIONS: detect_leaks=1:strict_string_checks=1:check_initialization_order=1
      UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=0

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Enable sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Initialize required submodules
        run: git submodule update --init --depth 1 third_party/secp256k1-zkp

      - name: Configure
        run: >
          cmake --preset sanitizers-int
          -DCMAKE_C_COMPILER_LAUNCHER=sccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Build
        run: cmake --build --preset sanitizers-int --parallel

      - name: Show sccache stats
        run: sccache --show-stats

      - name: Test
        run: ctest --preset sanitizers-int

  trapv-i686:
    runs-on: ubuntu-latest
    name: ubuntu-latest / gcc-trapv-i686
    env:
      SCCACHE_GHA_ENABLED: "true"
      SCCACHE_IGNORE_SERVER_IO_ERROR: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Enable sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install 32-bit multilib toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-multilib g++-multilib libc6-dev-i386

      - name: Show compiler versions
        run: |
          gcc --version | head -n 1
          g++ --version | head -n 1

      - name: Initialize required submodules
        run: git submodule update --init --depth 1 third_party/secp256k1-zkp

      - name: Configure
        run: >
          cmake --preset trapv-i686
          -DCMAKE_C_COMPILER_LAUNCHER=sccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Build
        run: cmake --build --preset trapv-i686 --parallel

      - name: Show sccache stats
        run: sccache --show-stats

      - name: Test
        run: ctest --preset trapv-i686

  bitcoin-i686-debug:
    runs-on: ubuntu-24.04
    name: ubuntu-24.04 / clang-i686-bitcoin-debug
    env:
      SCCACHE_GHA_ENABLED: "true"
      SCCACHE_IGNORE_SERVER_IO_ERROR: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Enable sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install Bitcoin-like 32-bit toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm clang g++-multilib libc6-dev-i386

      - name: Show compiler versions
        run: |
          clang --version | head -n 1
          clang++ --version | head -n 1

      - name: Initialize required submodules
        run: git submodule update --init --depth 1 third_party/secp256k1-zkp third_party/nanobench

      - name: Configure
        run: >
          cmake --preset bitcoin-i686-debug
          -DCMAKE_C_COMPILER_LAUNCHER=sccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Build
        run: cmake --build --preset bitcoin-i686-debug --parallel

      - name: Show sccache stats
        run: sccache --show-stats

      - name: Test
        run: ctest --preset bitcoin-i686-debug

  bitcoin-i686-downstream-proof-repro:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: bitcoin-i686-debug
            binary_dir: build-bitcoin-i686-debug
            stack_limit_kb: 8192
            lane_name: debug
          - preset: bitcoin-i686-smallstack
            binary_dir: build-bitcoin-i686-smallstack
            stack_limit_kb: 512
            lane_name: smallstack
    name: ubuntu-24.04 / clang-i686-downstream-proof-repro / ${{ matrix.lane_name }}
    env:
      SCCACHE_GHA_ENABLED: "true"
      SCCACHE_IGNORE_SERVER_IO_ERROR: "1"
      MALLOC_CHECK_: "3"

    steps:
      - uses: actions/checkout@v4

      - name: Enable sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install Bitcoin-like 32-bit toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm clang g++-multilib libc6-dev-i386

      - name: Show compiler versions
        run: |
          clang --version | head -n 1
          clang++ --version | head -n 1

      - name: Initialize required submodules
        run: git submodule update --init --depth 1 third_party/secp256k1-zkp

      - name: Configure
        run: >
          cmake --preset ${{ matrix.preset }}
          -DCMAKE_C_COMPILER_LAUNCHER=sccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
          -DPURIFY_BUILD_BENCH=OFF

      - name: Build
        run: >
          cmake --build --preset ${{ matrix.preset }} --parallel
          --target purify_tests purify_puresign_topic_proof_repro

      - name: Show sccache stats
        run: sccache --show-stats

      - name: Run downstream proof-path repro
        run: |
          for perturb in 41 85 137 213; do
            for round in $(seq 1 32); do
              echo "Running uncached topic-proof repro preset=${{ matrix.preset }} round=${round} MALLOC_PERTURB_=${perturb}"
              ulimit -s ${{ matrix.stack_limit_kb }}
              MALLOC_PERTURB_="${perturb}" ./${{ matrix.binary_dir }}/purify_puresign_topic_proof_repro 16 || {
                echo "Re-running repro with PURIFY_BPPP_TRACE=1 after failure"
                ulimit -s ${{ matrix.stack_limit_kb }}
                MALLOC_PERTURB_="${perturb}" PURIFY_BPPP_TRACE=1 \
                  ./${{ matrix.binary_dir }}/purify_puresign_topic_proof_repro 4
                exit 1
              }
            done
          done

  bitcoin-i686-downstream-proof-valgrind:
    runs-on: ubuntu-24.04
    name: ubuntu-24.04 / clang-i686-downstream-proof-valgrind
    env:
      SCCACHE_GHA_ENABLED: "true"
      SCCACHE_IGNORE_SERVER_IO_ERROR: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Enable sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install i686 toolchain and Valgrind
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y \
            llvm \
            clang \
            g++-multilib \
            libc6-dev-i386 \
            libc6-dbg \
            libc6-dbg:i386 \
            valgrind

      - name: Show compiler versions
        run: |
          clang --version | head -n 1
          clang++ --version | head -n 1
          valgrind --version
          dpkg -l libc6-dbg libc6-dbg:i386 | tail -n +6

      - name: Initialize required submodules
        run: git submodule update --init --depth 1 third_party/secp256k1-zkp

      - name: Configure
        run: >
          cmake --preset bitcoin-i686-debug
          -DCMAKE_C_COMPILER_LAUNCHER=sccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
          -DPURIFY_BUILD_BENCH=OFF

      - name: Build
        run: >
          cmake --build --preset bitcoin-i686-debug --parallel
          --target purify_puresign_topic_proof_repro

      - name: Show sccache stats
        run: sccache --show-stats

      - name: Run downstream proof-path repro under Valgrind
        run: |
          valgrind \
            --tool=memcheck \
            --error-exitcode=1 \
            --leak-check=full \
            --show-leak-kinds=all \
            --errors-for-leak-kinds=all \
            --track-origins=yes \
            --num-callers=40 \
            ./build-bitcoin-i686-debug/purify_puresign_topic_proof_repro 32 || {
              echo "Re-running repro with PURIFY_BPPP_TRACE=1 after Valgrind failure"
              PURIFY_BPPP_TRACE=1 ./build-bitcoin-i686-debug/purify_puresign_topic_proof_repro 4
              exit 1
            }

  bitcoin-i686-smallstack:
    runs-on: ubuntu-24.04
    name: ubuntu-24.04 / clang-i686-bitcoin-smallstack
    env:
      SCCACHE_GHA_ENABLED: "true"
      SCCACHE_IGNORE_SERVER_IO_ERROR: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Enable sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install Bitcoin-like 32-bit toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm clang g++-multilib libc6-dev-i386

      - name: Show compiler versions
        run: |
          clang --version | head -n 1
          clang++ --version | head -n 1

      - name: Initialize required submodules
        run: git submodule update --init --depth 1 third_party/secp256k1-zkp

      - name: Configure
        run: >
          cmake --preset bitcoin-i686-smallstack
          -DCMAKE_C_COMPILER_LAUNCHER=sccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Build
        run: cmake --build --preset bitcoin-i686-smallstack --parallel

      - name: Show sccache stats
        run: sccache --show-stats

      - name: Test
        run: |
          ulimit -s 512
          ctest --preset bitcoin-i686-smallstack

  valgrind:
    runs-on: ubuntu-latest
    name: ubuntu-latest / valgrind
    env:
      SCCACHE_GHA_ENABLED: "true"
      SCCACHE_IGNORE_SERVER_IO_ERROR: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Enable sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install Valgrind
        run: |
          sudo apt-get update
          sudo apt-get install -y valgrind

      - name: Initialize required submodules
        run: git submodule update --init --depth 1 third_party/secp256k1-zkp

      - name: Configure
        run: >
          cmake --preset valgrind
          -DCMAKE_C_COMPILER_LAUNCHER=sccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Build
        run: cmake --build --preset valgrind --parallel

      - name: Show sccache stats
        run: sccache --show-stats

      - name: Test
        run: ctest --preset valgrind

  cbmc:
    runs-on: ubuntu-latest
    name: ubuntu-latest / cbmc

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install CBMC
        run: |
          sudo apt-get update
          curl -L -o cbmc.deb https://github.com/diffblue/cbmc/releases/download/cbmc-6.8.0/ubuntu-24.04-cbmc-6.8.0-Linux.deb
          sudo apt-get install -y ./cbmc.deb

      - name: Show CBMC Version
        run: cbmc --version

      - name: Initialize required submodules
        run: git submodule update --init --depth 1 third_party/secp256k1-zkp

      - name: Configure
        run: cmake --preset cbmc

      - name: Test
        run: ctest --preset cbmc --output-on-failure
