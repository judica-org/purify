<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Purify</title>
    <meta
      name="description"
      content="Purify deterministically derives nonce points from a secret key pair and a message, with a proving relation built to stay circuit-friendly.">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">Judica Research</p>
        <h1>Purify</h1>
        <p class="lede">
          Purify turns a secret key pair and a message into a deterministic nonce point, while
          keeping the proving relation compact enough to map into arithmetic circuits.
        </p>
        <div class="actions">
          <a class="button button-primary" href="./paper/">Read the paper</a>
          <a class="button" href="./docs/">Browse API docs</a>
          <a class="button" href="https://github.com/judica-org/purify">View the repository</a>
        </div>
      </section>

      <section class="signal-panel">
        <div class="signal-frame">
          <svg class="signal-diagram" viewBox="0 0 1200 560" role="img"
            aria-label="A mirrored diagram shows private evaluation producing r on the left and public verification learning R on the right.">
            <line class="signal-divider" x1="600" y1="74" x2="600" y2="474" />
            <text class="signal-half-title" x="250" y="52" text-anchor="middle">private</text>
            <text class="signal-half-title" x="950" y="52" text-anchor="middle">public</text>
            <path class="signal-track signal-track-secret signal-track-rtl" d="M 100 154 C 206 154, 264 176, 286 214" />
            <path class="signal-track signal-track-secret signal-track-rtl" d="M 100 250 C 206 250, 260 250, 286 250" />
            <path class="signal-track signal-track-message signal-track-rtl" d="M 100 346 C 206 346, 264 324, 286 286" />
            <path class="signal-track signal-track-public signal-track-rtl" d="M 1100 132 C 1014 132, 972 170, 930 214" />
            <path class="signal-track signal-track-public signal-track-rtl" d="M 1100 210 C 1014 210, 972 222, 930 238" />
            <path class="signal-track signal-track-message signal-track-rtl" d="M 1100 288 C 1014 288, 972 278, 930 262" />
            <path class="signal-track signal-track-proof signal-track-rtl" d="M 1100 366 C 1014 366, 972 330, 930 286" />
            <path class="signal-track signal-track-purify-r signal-track-rtl" d="M 400 250 C 420 250, 442 250, 472 250" />
            <path class="signal-track signal-track-verify-r signal-track-rtl" d="M 816 250 C 794 250, 770 250, 742 250" />
            <path class="signal-track signal-track-proof-builder signal-track-rtl"
              d="M 520 278 C 590 336, 652 388, 708 424" />
            <path class="signal-track signal-track-proof-builder signal-track-rtl"
              d="M 826 424 C 918 418, 1012 404, 1106 366" />
            <circle class="signal-node signal-node-secret" cx="82" cy="154" r="12" />
            <circle class="signal-node signal-node-secret" cx="82" cy="250" r="12" />
            <circle class="signal-node signal-node-message" cx="82" cy="346" r="12" />
            <circle class="signal-node signal-node-public" cx="1118" cy="132" r="12" />
            <circle class="signal-node signal-node-public" cx="1118" cy="210" r="12" />
            <circle class="signal-node signal-node-message" cx="1118" cy="288" r="12" />
            <circle class="signal-node signal-node-proof" cx="1118" cy="366" r="12" />
            <text class="signal-label" x="132" y="148">z1</text>
            <text class="signal-caption" x="132" y="172">secret</text>
            <text class="signal-label" x="132" y="244">z2</text>
            <text class="signal-caption" x="132" y="268">secret</text>
            <text class="signal-label" x="132" y="340">m</text>
            <text class="signal-caption" x="132" y="364">message</text>
            <text class="signal-label signal-label-tight" x="1076" y="126" text-anchor="end">[z1]G1</text>
            <text class="signal-caption signal-caption-tight" x="1076" y="148" text-anchor="end">pubkey</text>
            <text class="signal-label signal-label-tight" x="1076" y="204" text-anchor="end">[z2]G2</text>
            <text class="signal-caption signal-caption-tight" x="1076" y="226" text-anchor="end">pubkey</text>
            <text class="signal-label" x="1076" y="282" text-anchor="end">m</text>
            <text class="signal-caption" x="1076" y="304" text-anchor="end">message</text>
            <text class="signal-label" x="1076" y="360" text-anchor="end">ZK</text>
            <text class="signal-caption" x="1076" y="382" text-anchor="end">proof</text>
            <g class="signal-core-group">
              <circle class="signal-core-ring" cx="340" cy="250" r="78" />
              <circle class="signal-core" cx="340" cy="250" r="60" />
              <text class="signal-core-label" x="340" y="243" text-anchor="middle">Purify</text>
              <text class="signal-core-caption" x="340" y="270" text-anchor="middle">derive r</text>
            </g>
            <g class="signal-scalar-group">
              <circle class="signal-scalar-ring" cx="500" cy="250" r="38" />
              <circle class="signal-scalar" cx="500" cy="250" r="28" />
              <text class="signal-scalar-label" x="500" y="256" text-anchor="middle">r</text>
            </g>
            <g class="signal-point-group">
              <circle class="signal-point-ring" cx="700" cy="250" r="56" />
              <circle class="signal-point" cx="700" cy="250" r="40" />
              <text class="signal-point-label" x="700" y="257" text-anchor="middle">R</text>
            </g>
            <g class="signal-prover-group">
              <rect class="signal-prover-box" x="708" y="398" width="118" height="52" rx="18" />
              <text class="signal-prover-label" x="767" y="430" text-anchor="middle">Prover</text>
            </g>
            <g class="signal-core-group signal-core-group-public">
              <circle class="signal-core-ring signal-core-ring-public" cx="876" cy="250" r="78" />
              <circle class="signal-core signal-core-public" cx="876" cy="250" r="60" />
              <text class="signal-core-label" x="876" y="243" text-anchor="middle">Verify</text>
              <text class="signal-core-caption" x="876" y="270" text-anchor="middle">learn R</text>
            </g>
          </svg>
        </div>
      </section>
    </main>
  </body>
</html>
